<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Workspace Terminal</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root {
      /* Core Palette */
      --primary: #4e2b5c;
      --primary-hover: #3b1e47;
      --accent-blue: #0284c7;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;

      /* Light Theme Variables */
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --bg-sidebar: #ffffff;
      --bg-input: #f1f5f9;
      --border-color: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --bubble-ai: #f8fafc;
      --bubble-user: var(--primary);
      --scrollbar-thumb: #cbd5e1;
    }

    [data-theme="dark"] {
      /* Dark Theme Variables */
      --bg-body: #090e17;
      --bg-card: #111827;
      --bg-sidebar: #111827;
      --bg-input: #1f2937;
      --border-color: #374151;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --bubble-ai: #1f2937;
      --bubble-user: #6b3f7e;
      --scrollbar-thumb: #4b5563;
    }

    /* === BASE RESET & TYPOGRAPHY === */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      transition: background-color 0.3s ease, color 0.3s ease;
      line-height: 1.5;
    }

    /* === CUSTOM SCROLLBAR === */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* === LAYOUT === */
    .app-container {
      display: flex;
      width: 100%;
      max-width: 1300px;
      height: 92vh;
      gap: 1.5rem;
    }

    /* === SIDEBAR === */
    .sidebar {
      width: 280px;
      background: var(--bg-sidebar);
      border-radius: 12px;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s, border-color 0.3s;
    }

    .sidebar-header {
      padding: 1.25rem;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-input);
    }

    .sidebar-header h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      color: var(--primary);
    }
    [data-theme="dark"] .sidebar-header h2 { color: #d8b4e2; }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .sidebar-section h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    
    .project-list, .prompt-grid { display: flex; flex-direction: column; gap: 0.5rem; }
    
    .project-item {
      padding: 0.75rem;
      border-radius: 8px;
      background: var(--bg-body);
      border: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .project-item:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }
    
    .project-item.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    
    .project-name { font-weight: 500; font-size: 0.85rem; color: inherit; }
    
    .project-status {
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    
    /* Dynamic Status Colors */
    .project-item:not(.active) .status-active { background: #dcfce7; color: #15803d; }
    .project-item:not(.active) .status-planning { background: #fef9c3; color: #a16207; }
    [data-theme="dark"] .project-item:not(.active) .status-active { background: rgba(21,128,61,0.2); color: #4ade80; }
    [data-theme="dark"] .project-item:not(.active) .status-planning { background: rgba(161,98,7,0.2); color: #facc15; }
    .project-item.active .project-status { background: rgba(255,255,255,0.2); color: #fff; }

    .prompt-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      text-align: left;
      font-size: 0.8rem;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .prompt-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--bg-body); }

    /* === CHAT WORKSPACE === */
    .chat-wrapper {
      flex: 1;
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .chat-header {
      background: var(--bg-card);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .chat-header .icon {
      width: 36px; height: 36px;
      background: var(--primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
    }

    .chat-header-info h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      margin: 0;
      color: var(--text-main);
    }

    .chat-header-info p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 0;
    }
    
    .header-actions { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }

    .session-badge {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
    }

    .btn-icon {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      border-radius: 6px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-icon:hover { background: var(--bg-input); color: var(--text-main); border-color: var(--text-muted); }

    /* === CHAT AREA === */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      scroll-behavior: smooth;
    }

    #empty-state {
      margin: auto;
      text-align: center;
      color: var(--text-muted);
    }
    
    #empty-state svg { color: var(--border-color); margin-bottom: 1rem; width: 48px; height: 48px; }
    #empty-state h3 { font-family: 'Poppins', sans-serif; font-size: 1.1rem; color: var(--text-main); margin-bottom: 0.5rem; }
    #empty-state p { font-size: 0.85rem; max-width: 300px; line-height: 1.5; }

    .msg-row { display: flex; gap: 1rem; align-items: flex-start; }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
      font-family: 'Poppins', sans-serif;
    }
    .avatar.bot { background: var(--bg-input); color: var(--primary); border: 1px solid var(--border-color); }
    .avatar.user { background: var(--accent-blue); color: #fff; }

    .msg-col { display: flex; flex-direction: column; gap: 0.25rem; max-width: 80%; }
    .msg-row.user .msg-col { align-items: flex-end; }

    .bubble {
      padding: 0.875rem 1.125rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
      word-break: break-word;
    }
    
    .bubble.user { background: var(--bubble-user); color: #fff; border-top-right-radius: 2px; }
    .bubble.bot { background: var(--bubble-ai); color: var(--text-main); border: 1px solid var(--border-color); border-top-left-radius: 2px; }
    
    .bubble p { margin-bottom: 0.75rem; }
    .bubble p:last-child { margin-bottom: 0; }

    .msg-timestamp { font-size: 0.65rem; color: var(--text-muted); padding: 0 0.25rem; }

    /* Markdown Styling Refinements */
    .bubble.bot table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.85rem; border-radius: 8px; overflow: hidden; }
    .bubble.bot th, .bubble.bot td { border: 1px solid var(--border-color); padding: 0.5rem 0.75rem; text-align: left; }
    .bubble.bot th { background: var(--bg-input); font-weight: 600; }
    
    .code-container {
      background: #1e1e1e;
      border-radius: 8px;
      overflow: hidden;
      margin: 1rem 0;
      border: 1px solid #333;
    }
    .code-header {
      background: #2d2d2d;
      color: #ccc;
      font-size: 0.7rem;
      padding: 0.5rem 1rem;
      display: flex; justify-content: space-between; align-items: center;
      font-family: 'JetBrains Mono', monospace;
    }
    .bubble pre { margin: 0; padding: 1rem; overflow-x: auto; }
    .bubble pre code { background: transparent !important; color: #d4d4d4 !important; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    
    .btn-copy-code {
      background: transparent; border: 1px solid #555; color: #ccc;
      padding: 0.25rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.7rem; transition: 0.2s;
    }
    .btn-copy-code:hover { background: #444; color: #fff; }

    /* === INPUT AREA === */
    .preview-container {
      display: none;
      padding: 0.75rem 1.5rem;
      background: var(--bg-input);
      border-top: 1px solid var(--border-color);
      align-items: center;
      gap: 1rem;
    }
    
    .preview-wrapper { position: relative; }
    .preview-wrapper img { max-height: 60px; border-radius: 6px; border: 1px solid var(--border-color); }
    .doc-preview-box {
      width: 60px; height: 60px; background: var(--bg-card); border-radius: 6px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: bold; border: 1px solid var(--border-color);
    }
    .btn-remove-preview {
      position: absolute; top: -6px; right: -6px;
      background: var(--danger); color: white; border: none;
      width: 18px; height: 18px; border-radius: 50%; font-size: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .input-area {
      padding: 1rem 1.5rem;
      background: var(--bg-card);
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-input);
      color: var(--text-main);
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      max-height: 150px;
      outline: none;
      transition: all 0.2s;
    }
    
    #user-input:focus {
      border-color: var(--primary);
      background: var(--bg-card);
      box-shadow: 0 0 0 3px rgba(78, 43, 92, 0.1);
    }

    .btn-action {
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      display: flex; align-items: center; gap: 0.5rem;
      transition: background-color 0.2s, transform 0.1s;
    }
    
    #send-btn { background: var(--primary); color: white; }
    #send-btn:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
    #send-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 0; }
      .app-container { height: 100dvh; gap: 0; }
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
        border-radius: 0; transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); }
      .chat-wrapper { border-radius: 0; border: none; }
      .msg-col { max-width: 90%; }
    }
  </style>
</head>
<body>

<main class="app-container">
  
  <aside class="sidebar" id="sidebar" role="navigation">
    <header class="sidebar-header">
      <h2>Workspace Directory</h2>
    </header>
    <div class="sidebar-content">
      <section class="sidebar-section">
        <h3>Active Projects</h3>
        <div class="project-list" id="project-list" role="listbox">
          <div class="project-item active" role="option" aria-selected="true" tabindex="0" onclick="selectProject(this, 'n8n-automation', 'n8n Automation')">
            <span class="project-name">n8n Automation</span>
            <span class="project-status status-active">Active</span>
          </div>
          <div class="project-item" role="option" aria-selected="false" tabindex="0" onclick="selectProject(this, 'gsheet-sync', 'Google Sheets Sync')">
            <span class="project-name">Google Sheets Sync</span>
            <span class="project-status status-active">Active</span>
          </div>
          <div class="project-item" role="option" aria-selected="false" tabindex="0" onclick="selectProject(this, 'ai-debugger', 'AI Code Debugger')">
            <span class="project-name">AI Code Debugger</span>
            <span class="project-status status-planning">Planning</span>
          </div>
        </div>
      </section>
      
      <section class="sidebar-section">
        <h3>Quick Prompts</h3>
        <div class="prompt-grid">
          <button class="prompt-btn" onclick="applyTemplate('Tolong analisis potongan file/script berikut ini:')">🔍 Analisis Script/File</button>
          <button class="prompt-btn" onclick="applyTemplate('Tolong perbaiki atau rapikan struktur database/tabel berikut:')">📊 Rapikan Data Tabel</button>
          <button class="prompt-btn" onclick="applyTemplate('Ubah struktur data mentah ini menjadi JSON valid:')">🛠️ Konversi ke JSON</button>
        </div>
      </section>
    </div>
  </aside>

  <section class="chat-wrapper">
    <header class="chat-header">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M21.17 8H12V2.83"/>
        </svg>
      </div>
      <div class="chat-header-info">
        <h1 id="active-project-title">n8n Automation</h1>
        <p>Data & Automation Assistant</p>
      </div>
      
      <div class="header-actions">
        <span class="session-badge" id="session-label" title="Session ID">SID-XXXX</span>
        <button id="theme-toggle-btn" class="btn-icon" onclick="toggleTheme()" aria-label="Toggle Theme">
          <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </header>

    <div id="chat-box" role="log" aria-live="polite">
      <div id="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <h3>Terminal Ready</h3>
        <p>Kirim instruksi, unggah dokumen pendukung, atau pilih template di sidebar.</p>
      </div>
    </div>

    <div class="preview-container" id="preview-container">
      <div class="preview-wrapper" id="preview-wrapper"></div>
      <div>
        <span style="font-size: 0.75rem; color: var(--text-muted);" id="file-details"></span>
        <div id="file-warning" style="display:none; font-size: 0.75rem; color: var(--danger); margin-top:4px;"></div>
      </div>
    </div>

    <footer class="input-area">
      <input type="file" id="file-input" accept="image/*,.pdf,.csv,.xlsx,.docx" style="display: none;" onchange="handleFileSelect(event)">
      
      <button class="btn-icon" title="Upload File" onclick="document.getElementById('file-input').click()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      
      <textarea id="user-input" rows="1" placeholder="Ketik pesan atau paste data..."></textarea>
      
      <button id="clear-btn" class="btn-icon" title="Clear Session" onclick="clearChat()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
        </svg>
      </button>

      <button id="send-btn" class="btn-action" onclick="sendMessage()">
        <span id="send-label">Kirim</span>
        <svg id="send-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
        </svg>
      </button>
    </footer>
  </section>

</main>

<script>
  // Setup Marked.js
  marked.setOptions({ breaks: true, gfm: true });

  // Theme Management
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const icon = document.getElementById('theme-icon');
    if (theme === 'dark') {
      icon.innerHTML = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
    } else {
      icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
    }
  }

  function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('ai_workspace_theme', newTheme);
    applyTheme(newTheme);
  }

  const savedTheme = localStorage.getItem('ai_workspace_theme') || 'light';
  applyTheme(savedTheme);

  // Core Utilities
  function generateUUID() {
    if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }

  function formatTime() {
    return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }

  function copyToClipboard(button) {
    const code = button.closest('.code-container').querySelector('pre code').textContent;
    navigator.clipboard.writeText(code).then(() => {
      const originalText = button.textContent;
      button.textContent = '✓ Copied';
      setTimeout(() => { button.textContent = originalText; }, 2000);
    });
  }

  // App State
  const USER_NAME = 'PU';
  let sessionId = localStorage.getItem('ai_chat_session_id') || generateUUID();
  localStorage.setItem('ai_chat_session_id', sessionId);
  document.getElementById('session-label').textContent = 'SID-' + sessionId.slice(0, 6).toUpperCase();

  let activeProjectId = 'n8n-automation';
  let activeProjectName = 'n8n Automation';
  let isSending = false;

  const WEBHOOK_URL = 'https://n8.waruna-group.co.id/webhook/ai-chat-endpoint';
  
  // DOM Elements
  const chatBox = document.getElementById('chat-box');
  const emptyState = document.getElementById('empty-state');
  const textarea = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const sendLabel = document.getElementById('send-label');
  
  let activeFileBase64 = null, activeFileName = '', activeFileType = '';
  const MAX_FILE_SIZE_MB = 10;

  // Auto-resize textarea
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
  });

  async function selectProject(element, projectId, projectName) {
    if (element.classList.contains('active') || isSending) return;
    document.querySelectorAll('.project-item').forEach(i => i.classList.remove('active'));
    element.classList.add('active');

    activeProjectId = projectId;
    activeProjectName = projectName;
    document.getElementById('active-project-title').textContent = projectName;

    chatBox.innerHTML = '';
    const spinner = document.createElement('div');
    spinner.style.cssText = 'text-align:center; padding:2rem; color:var(--text-muted); font-size:0.85rem;';
    spinner.textContent = 'Memuat riwayat...';
    chatBox.appendChild(spinner);

    await loadHistoryFromGSheet();
  }

  // File Handling
  function handleFileSelect(e) { processFile(e.target.files[0]); }
  textarea.addEventListener('paste', e => {
    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
    for (const item of items) if (item.kind === 'file') processFile(item.getAsFile());
  });

  function processFile(file) {
    if(!file) return;
    const warning = document.getElementById('file-warning');
    warning.style.display = 'none';
    
    if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
      warning.textContent = `⚠️ File terlalu besar (maks ${MAX_FILE_SIZE_MB}MB).`;
      warning.style.display = 'block';
      document.getElementById('preview-container').style.display = 'flex';
      return;
    }

    const reader = new FileReader();
    activeFileName = file.name;
    activeFileType = file.type;
    
    reader.onload = e => {
      activeFileBase64 = e.target.result;
      const wrapper = document.getElementById('preview-wrapper');
      
      if (file.type.startsWith('image/')) {
        wrapper.innerHTML = `<img src="${activeFileBase64}" alt="Preview"><button class="btn-remove-preview" onclick="clearFilePreview()">×</button>`;
      } else {
        const ext = file.name.split('.').pop().toUpperCase();
        wrapper.innerHTML = `<div class="doc-preview-box">${ext}</div><button class="btn-remove-preview" onclick="clearFilePreview()">×</button>`;
      }
      document.getElementById('file-details').textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
      document.getElementById('preview-container').style.display = 'flex';
    };
    reader.readAsDataURL(file);
  }

  function clearFilePreview() {
    activeFileBase64 = null; activeFileName = ''; activeFileType = '';
    document.getElementById('preview-wrapper').innerHTML = '';
    document.getElementById('preview-container').style.display = 'none';
    document.getElementById('file-input').value = '';
  }

  function applyTemplate(text) {
    textarea.value = text + ' ';
    textarea.focus();
    textarea.dispatchEvent(new Event('input'));
  }

  function appendMessage(role, content) {
    emptyState.style.display = 'none';
    const row = document.createElement('div');
    row.classList.add('msg-row', role);

    const avatar = document.createElement('div');
    avatar.classList.add('avatar', role);
    avatar.textContent = role === 'user' ? USER_NAME : 'AI';

    const col = document.createElement('div');
    col.classList.add('msg-col');

    const bubble = document.createElement('div');
    bubble.classList.add('bubble', role);

    if (role === 'bot') {
      let safeContent = typeof content !== 'string' ? JSON.stringify(content, null, 2) : content;
      
      // VITAL FIX: Sanitize parsed markdown to prevent XSS
      bubble.innerHTML = DOMPurify.sanitize(marked.parse(safeContent));
      
      bubble.querySelectorAll('pre code').forEach((block) => {
        hljs.highlightElement(block);
        
        const pre = block.parentElement;
        const wrapper = document.createElement('div');
        wrapper.className = 'code-container';
        
        let lang = 'CODE';
        block.classList.forEach(cls => { if(cls.startsWith('language-')) lang = cls.replace('language-', '').toUpperCase(); });

        const header = document.createElement('div');
        header.className = 'code-header';
        header.innerHTML = `<span>${lang}</span><button class="btn-copy-code" onclick="copyToClipboard(this)">Copy</button>`;
        
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(header);
        wrapper.appendChild(pre);
      });
    } else {
      bubble.textContent = content;
    }

    const ts = document.createElement('span');
    ts.classList.add('msg-timestamp');
    ts.textContent = formatTime();

    col.appendChild(bubble);
    col.appendChild(ts);
    row.appendChild(avatar);
    row.appendChild(col);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function loadHistoryFromGSheet() {
    try {
      const res = await fetch(`${WEBHOOK_URL}?sessionId=${sessionId}&projectId=${activeProjectId}&action=loadHistory`);
      chatBox.innerHTML = '';
      if (res.ok) {
        const data = await res.json();
        if (data?.history?.length) {
          data.history.forEach(msg => appendMessage(msg.role, msg.content));
        } else {
          chatBox.appendChild(emptyState);
          emptyState.style.display = 'block';
        }
      }
    } catch (err) {
      chatBox.innerHTML = '';
      chatBox.appendChild(emptyState);
      emptyState.style.display = 'block';
    }
  }

  async function sendMessage() {
    const text = textarea.value.trim();
    if ((!text && !activeFileBase64) || isSending) return;

    appendMessage('user', text);
    textarea.value = '';
    textarea.style.height = 'auto';
    
    const fileToSend = activeFileBase64, nameToSend = activeFileName, typeToSend = activeFileType;
    clearFilePreview();
    
    isSending = true;
    sendBtn.disabled = true;
    sendLabel.textContent = '...';

    // Temp indicator
    const tempBot = document.createElement('div');
    tempBot.className = 'msg-row bot';
    tempBot.innerHTML = `<div class="avatar bot">AI</div><div class="msg-col"><div class="bubble bot" style="color:var(--text-muted); font-style:italic;">Memproses...</div></div>`;
    chatBox.appendChild(tempBot);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chatInput: `[Context: Project "${activeProjectName}"]. ${text}`,
          sessionId, projectId: activeProjectId,
          fileData: fileToSend, fileName: nameToSend, fileType: typeToSend
        })
      });
      
      tempBot.remove();
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const rawData = await res.json();
      const data = Array.isArray(rawData) ? rawData[0] : rawData;
      appendMessage('bot', data?.output || data?.text || data?.response || JSON.stringify(data));
      
    } catch (err) {
      tempBot.remove();
      appendMessage('bot', `⚠️ **Error:**\n\`\`\`text\n${err.message}\n\`\`\``);
    }

    isSending = false;
    sendBtn.disabled = false;
    sendLabel.textContent = 'Kirim';
    textarea.focus();
  }

  function clearChat() {
    if (!confirm('Reset session ini? Riwayat lokal akan dihapus.')) return;
    chatBox.innerHTML = '';
    chatBox.appendChild(emptyState);
    emptyState.style.display = 'block';
    clearFilePreview();
  }

  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  window.addEventListener('DOMContentLoaded', loadHistoryFromGSheet);
</script>

</body>
</html>
