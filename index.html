<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waruna AI Automation Terminal</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root {
      --primary: #4e2b5c;
      --primary-hover: #3b1e47;
      --bg-body: linear-gradient(135deg, #fffdf2 0%, #ffe9d6 100%);
      --bg-card: #ffffff;
      --border-color: #e8dee8;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --bubble-ai: #fbf9fc;
      --bubble-user: #4e2b5c;
      --accent-blue: #0284c7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .app-container {
      display: flex;
      width: 100%;
      max-width: 1400px;
      height: 85vh;
      gap: 30px;
    }

    /* === SIDEBAR === */
    .sidebar {
      width: 350px;
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border-color);
      box-shadow: 0 12px 40px rgba(78, 43, 92, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 25px 30px;
      border-bottom: 1px solid var(--border-color);
      background: #fbf9fc;
    }
    
    .sidebar-header h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sidebar-content { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    
    .project-item {
      padding: 12px 16px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .project-item.active { background: var(--primary); color: white; }

    /* === CHAT CONTAINER === */
    .chat-wrapper {
      flex: 1;
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(78, 43, 92, 0.08);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: var(--primary);
      padding: 20px 30px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .chat-header h1 { font-family: 'Poppins', sans-serif; font-size: 18px; color: #fff; }

    #chat-box { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }

    .bubble {
      padding: 16px 20px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 80%;
    }

    .bubble.bot { background: #fbf9fc; border: 1px solid #e8dee8; border-bottom-left-radius: 4px; }
    .bubble.user { background: var(--primary); color: #ffffff; border-bottom-right-radius: 4px; align-self: flex-end; }

    /* === INPUT AREA === */
    .input-area {
      padding: 20px;
      background: #ffffff;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    #user-input {
      flex: 1;
      border: 1px solid #b59ebc;
      border-radius: 10px;
      padding: 14px 18px;
      background: #fbf9fc;
      outline: none;
    }

    .btn-action {
      background: var(--primary);
      color: white;
      border-radius: 10px;
      padding: 14px 30px;
      font-weight: 700;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
    }

    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-thumb { background: #dcd6de; border-radius: 10px; }

  </style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header"><h2>Workspace Directory</h2></div>
    <div class="sidebar-content">
      <div class="project-item active">n8n Automation</div>
      <div class="project-item">Google Sheets Sync</div>
    </div>
  </aside>

  <div class="chat-wrapper">
    <div class="chat-header">
      <h1>Waruna Automation Terminal</h1>
    </div>

    <div id="chat-box">
      <div class="bubble bot">Selamat datang, silakan masukkan dokumen atau perintah audit Anda.</div>
    </div>

    <div class="input-area">
      <textarea id="user-input" rows="1" placeholder="Ketik instruksi..."></textarea>
      <button id="send-btn" class="btn-action" onclick="sendMessage()">Kirim</button>
    </div>
  </div>
</div>

<script>
  function sendMessage() {
    const input = document.getElementById('user-input');
    if (!input.value.trim()) return;
    
    const chatBox = document.getElementById('chat-box');
    const userMsg = document.createElement('div');
    userMsg.className = 'bubble user';
    userMsg.textContent = input.value;
    chatBox.appendChild(userMsg);
    
    input.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>

</body>
</html>
