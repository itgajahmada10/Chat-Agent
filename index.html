<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Workspace Terminal</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Parser Markdown & Highlight JS -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root {
      --primary: #4e2b5c;
      --primary-hover: #3b1e47;
      --bg-body: #f1f5f9;
      --bg-card: #ffffff;
      --border-color: #cbd5e1;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --bubble-ai: #f8fafc;
      --bubble-user: #4e2b5c;
      --accent-blue: #0284c7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 950px;
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 90vh;
      overflow: hidden;
    }

    .chat-header {
      background: var(--primary);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .chat-header .icon {
      width: 34px; height: 34px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      color: #ffffff;
      margin: 0;
    }
    .chat-header p {
      font-size: 11px;
      color: #cbd5e1;
      margin: 0;
    }
    .session-badge {
      margin-left: auto;
      background: rgba(0,0,0,0.2);
      color: #e2e8f0;
      padding: 4px 10px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #ffffff;
      scroll-behavior: smooth;
    }
    
    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-track { background: #f1f5f9; }
    #chat-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .msg-row { display: flex; gap: 12px; align-items: flex-start; }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0; font-family: 'Poppins', sans-serif;
    }
    .avatar.bot { background: #e2e8f0; color: var(--primary); }
    .avatar.user { background: var(--accent-blue); color: white; }

    .bubble {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 14.5px;
      line-height: 1.6;
      word-break: break-word;
    }
    .bubble.user { background: var(--bubble-user); color: #ffffff; border-top-right-radius: 2px; }
    .bubble.bot { background: var(--bubble-ai); color: var(--text-main); border: 1px solid #e2e8f0; border-top-left-radius: 2px; }

    /* Markdown Styling */
    .bubble.bot p { margin-bottom: 12px; }
    .bubble.bot p:last-child { margin-bottom: 0; }
    
    .bubble.bot code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      background: #e2e8f0;
      color: #b91c1c;
      padding: 2px 6px;
      border-radius: 4px;
    }
    
    /* Blok Kode Gelap (Atom One Dark) */
    .bubble.bot pre {
      background: #282c34 !important;
      color: #abb2bf !important;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 12px 0;
    }
    .bubble.bot pre code {
      background: transparent !important;
      color: #abb2bf !important;
      padding: 0;
      font-size: 13px;
    }

    /* Tabel Responsif */
    .table-container {
      width: 100%;
      overflow-x: auto;
      margin: 12px 0;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
    }
    .bubble.bot table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    .bubble.bot th, .bubble.bot td {
      border: 1px solid #cbd5e1;
      padding: 8px 12px;
      text-align: left;
    }
    .bubble.bot th { background: #e2e8f0; font-weight: 600; }

    .bubble.bot ul, .bubble.bot ol { padding-left: 20px; margin: 8px 0; }
    .bubble.bot li { margin-bottom: 4px; }

    /* Preview Gambar Sebelum Dikirim */
    .preview-container {
      display: none;
      padding: 12px 24px;
      background: #f1f5f9;
      border-top: 1px solid var(--border-color);
      align-items: center;
      gap: 12px;
    }
    .preview-image-wrapper {
      position: relative;
      display: inline-block;
    }
    .preview-image-wrapper img {
      max-height: 80px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      display: block;
    }
    .btn-remove-preview {
      position: absolute;
      top: -6px; right: -6px;
      background: #ef4444;
      color: white;
      border: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      font-size: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold;
    }

    /* Animasi Loading AI */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 8px 10px;
      align-items: center;
    }
    .typing-indicator span {
      width: 8px; height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.3s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Input Area */
    .input-area {
      padding: 18px 24px;
      background: #f8fafc;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: #ffffff;
      color: var(--text-main);
      font-size: 14.5px;
      font-family: 'Inter', sans-serif;
      resize: none;
      max-height: 150px;
      outline: none;
      line-height: 1.5;
    }
    #user-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(78, 43, 92, 0.1); }

    .btn-action {
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      border: none;
      display: flex; align-items: center; gap: 8px;
      transition: 0.2s;
    }
    .btn-icon-only {
      padding: 12px;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: 0.2s;
    }
    .btn-icon-only:hover { background: #f1f5f9; color: var(--primary); }

    #send-btn { background: var(--primary); color: white; flex-shrink: 0; }
    #send-btn:hover { background: var(--primary-hover); }
    #send-btn:disabled { background: #94a3b8; cursor: not-allowed; }
    
    #clear-btn:hover { background: #fef2f2; color: #ef4444; border-color: #fecaca; }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M21.17 8H12V2.83"/>
      </svg>
    </div>
    <div>
      <h1>Workspace Intelligence</h1>
      <p>Data & Automation Assistant</p>
    </div>
    <span class="session-badge" id="session-label">SID-XXXX</span>
  </div>

  <div id="chat-box">
    <div style="text-align:center; padding: 40px; color: #94a3b8;" id="empty-state">
      <h3 style="font-family:'Poppins'; color:#64748b; margin-bottom:8px;">Terminal Siap</h3>
      <p style="font-size:13px;">Kirim instruksi analitik, script, atau konfigurasi n8n.</p>
    </div>
  </div>

  <!-- Container Preview Gambar -->
  <div class="preview-container" id="preview-container">
    <div class="preview-image-wrapper">
      <img id="image-preview" src="" alt="Preview">
      <button class="btn-remove-preview" onclick="clearImagePreview()">×</button>
    </div>
  </div>

  <div class="input-area">
    <!-- Input File Tersembunyi -->
    <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
    
    <button class="btn-icon-only" title="Upload Gambar" onclick="document.getElementById('file-input').click()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
    </button>
    
    <textarea id="user-input" rows="1" placeholder="Masukkan instruksi atau paste gambar (Ctrl+V)..."></textarea>
    
    <button id="clear-btn" class="btn-icon-only" title="Reset Session" onclick="clearChat()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
    </button>
    <button id="send-btn" class="btn-action" onclick="sendMessage()">
      KIRIM
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </button>
  </div>
</div>

<script>
  const renderer = new marked.Renderer();
  
  renderer.table = function(header, body) {
    return `<div class="table-container"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;
  };

  marked.setOptions({
    renderer: renderer,
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    },
    breaks: true
  });

  function generateUUID() {
    if (typeof crypto !== 'undefined' && crypto.randomUUID) {
      return crypto.randomUUID();
    }
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      const r = Math.random() * 16 | 0;
      const v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }

  let sessionId = localStorage.getItem('ai_chat_session_id');
  if (!sessionId) {
    sessionId = generateUUID();
    localStorage.setItem('ai_chat_session_id', sessionId);
  }
  document.getElementById('session-label').textContent = 'SID-' + sessionId.slice(0,6).toUpperCase();

  const WEBHOOK_URL = 'https://n8.waruna-group.co.id/webhook/ai-chat-endpoint';
  const chatBox = document.getElementById('chat-box');
  const emptyState = document.getElementById('empty-state');
  const textarea = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const previewContainer = document.getElementById('preview-container');
  const imagePreview = document.getElementById('image-preview');

  let activeImageBase64 = null; // Menyimpan data Base64 gambar aktif

  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
  });

  // ====== FITUR PASTE GAMBAR (Ctrl+V) ======
  textarea.addEventListener('paste', e => {
    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
    for (let index in items) {
      const item = items[index];
      if (item.kind === 'file' && item.type.startsWith('image/')) {
        const blob = item.getAsFile();
        processImage(blob);
      }
    }
  });

  // ====== FITUR KLIK UPLOAD ======
  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file && file.type.startsWith('image/')) {
      processImage(file);
    }
  }

  // Proses file gambar ke Base64
  function processImage(file) {
    const reader = new FileReader();
    reader.onload = function(event) {
      activeImageBase64 = event.target.result; // Base64 String lengkap
      imagePreview.src = activeImageBase64;
      previewContainer.style.display = 'flex';
    };
    reader.readAsDataURL(file);
  }

  function clearImagePreview() {
    activeImageBase64 = null;
    imagePreview.src = '';
    previewContainer.style.display = 'none';
    document.getElementById('file-input').value = '';
  }

  function appendMessage(role, content, imgBase64 = null) {
    if (emptyState) emptyState.style.display = 'none';

    const row = document.createElement('div');
    row.classList.add('msg-row', role);

    const avatar = document.createElement('div');
    avatar.classList.add('avatar', role);
    avatar.textContent = role === 'user' ? 'PU' : 'AI';

    const bubble = document.createElement('div');
    bubble.classList.add('bubble', role);

    if (role === 'bot') {
      bubble.innerHTML = marked.parse(content);
    } else {
      bubble.textContent = content;
      // Jika user mengirim gambar, tampilkan gambar di bubble chat user
      if (imgBase64) {
        const img = document.createElement('img');
        img.src = imgBase64;
        img.style.maxWidth = '100%';
        img.style.maxHeight = '200px';
        img.style.borderRadius = '6px';
        img.style.marginTop = '8px';
        img.style.display = 'block';
        bubble.appendChild(img);
      }
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatBox.appendChild(row);
    
    row.scrollIntoView({ behavior: 'smooth', block: 'end' });
    return row;
  }

  function showLoadingIndicator() {
    const row = document.createElement('div');
    row.classList.add('msg-row', 'bot', 'loading-row');

    const avatar = document.createElement('div');
    avatar.classList.add('avatar', 'bot');
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.classList.add('bubble', 'bot');
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatBox.appendChild(row);
    row.scrollIntoView({ behavior: 'smooth' });
    return row;
  }

  async function sendMessage() {
    const text = textarea.value.trim();
    if (!text && !activeImageBase64) return; // Mencegah kiriman kosong
    if (sendBtn.disabled) return;

    // Tampilkan pesan user beserta gambar (jika ada)
    appendMessage('user', text, activeImageBase64);
    
    // Backup data gambar dan reset input UI segera
    const imgToSend = activeImageBase64; 
    textarea.value = '';
    textarea.style.height = 'auto';
    clearImagePreview();
    
    sendBtn.disabled = true;
    const loadingBubble = showLoadingIndicator();

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          chatInput: text, 
          sessionId: sessionId,
          image: imgToSend // Akan berisi string Base64 atau null
        })
      });

      if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
      const data = await res.json();

      loadingBubble.remove();

      const reply = data?.output || data?.text || data?.response || JSON.stringify(data);
      appendMessage('bot', reply);

    } catch (err) {
      loadingBubble.remove();
      appendMessage('bot', `⚠️ **Kesalahan Koneksi:**\n\`${err.message}\``);
    }

    sendBtn.disabled = false;
    textarea.focus();
  }

  function clearChat() {
    chatBox.innerHTML = '';
    chatBox.appendChild(emptyState);
    emptyState.style.display = 'block';
    clearImagePreview();
    
    sessionId = generateUUID();
    localStorage.setItem('ai_chat_session_id', sessionId);
    document.getElementById('session-label').textContent = 'SID-' + sessionId.slice(0,6).toUpperCase();
  }

  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
